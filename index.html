<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Система тестирования</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f4f7f6; font-family: sans-serif; overflow: hidden; }
        .flex-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 12px; max-width: 450px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-start { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .workspace { display: flex; flex-direction: column; width: 100%; height: 100%; }
        iframe { width: 100%; flex-grow: 1; border: none; background: #ffffff; }
        
        .bottom-bar { width: 100%; background: #ffffff; box-shadow: 0 -3px 10px rgba(0,0,0,0.05); padding: 15px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .checkbox-container { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: bold; color: #d9534f; cursor: pointer; }
        .checkbox-container input { width: 20px; height: 20px; cursor: pointer; }
        
        .btn-finish { max-width: 500px; width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-finish:disabled { background: #cccccc; cursor: not-allowed; color: #666; }
    </style>
</head>
<body>

    <div class="flex-container" id="setup">
        <div class="card">
            <h2>Регистрация сессии</h2>
            <input type="text" id="name" placeholder="Имя и Фамилия">
            <button class="btn-start" onclick="start()">Начать тестирование</button>
        </div>
    </div>

    <div class="workspace" id="test" style="display:none;">
        <video id="video" autoplay playsinline style="display:none;"></video>
        
        <iframe src="https://forms.gle/GKJ6Cii2RgwdwzrN8"></iframe>
        
        <div class="bottom-bar">
            <label class="checkbox-container">
                <input type="checkbox" id="confirmSubmit" onchange="toggleFinishBtn()">
                Я подтверждаю, что нажал(а) кнопку «Отправить» внутри формы выше
            </label>
            <button id="finishBtn" class="btn-finish" onclick="finish()" disabled>Завершить тест</button>
        </div>
    </div>

    <script>
        // ВСТАВЬТЕ ССЫЛКУ НА APPS SCRIPT НИЖЕ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLD7Bfba_vzMm6tlm27T_bhAi7R5mrAGe-HhBYCysvoN-oy5EULQTKqKF6qtluuscp7w/exec";
        
        let cheatCount = 0;
        let isTesting = false;
        let startTimestamp;
        let startTimeFormatted;
        let photoTimer;

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && isTesting) { 
                cheatCount++; 
                alert("ВНИМАНИЕ: Вы покинули страницу! Это нарушение зафиксировано."); 
            }
        });

        // Управление разблокировкой кнопки
        function toggleFinishBtn() {
            const checkbox = document.getElementById('confirmSubmit');
            const btn = document.getElementById('finishBtn');
            btn.disabled = !checkbox.checked;
        }

        async function start() {
            const name = document.getElementById('name').value.trim();
            if(!name) return alert("Пожалуйста, введите имя.");
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" } });
                document.getElementById('video').srcObject = stream;
                
                document.getElementById('setup').style.display = 'none';
                document.getElementById('test').style.display = 'flex';
                
                isTesting = true;
                startTimestamp = Date.now();
                
                // Формируем красивое время старта (например, 14:30:00)
                let now = new Date();
                startTimeFormatted = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                
                // Делаем первый снимок мгновенно, чтобы в таблице сразу появилась строка
                sendPhoto(name);
                scheduleNextPhoto(name);
                
            } catch (err) {
                alert("Разрешите доступ к камере для тестирования.");
            }
        }

        async function sendPhoto(name) {
            const video = document.getElementById('video');
            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const image = canvas.toDataURL('image/jpeg', 0.75);
                
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ type: 'photo', name: name, image: image, startTime: startTimeFormatted }) 
                });
            } catch(e) {}
        }

        function scheduleNextPhoto(name) {
            if (!isTesting) return;
            let randomDelay = Math.floor(Math.random() * (90000 - 45000 + 1)) + 45000;
            photoTimer = setTimeout(() => {
                if (!isTesting) return; 
                sendPhoto(name);
                scheduleNextPhoto(name);
            }, randomDelay);
        }

        async function finish() {
            isTesting = false; 
            clearTimeout(photoTimer);
            
            const video = document.getElementById('video');
            if(video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());

            let totalSeconds = Math.floor((Date.now() - startTimestamp) / 1000);
            let timeString = `${Math.floor(totalSeconds / 60)} мин ${totalSeconds % 60} сек`;

            const name = document.getElementById('name').value;
            const btn = document.getElementById('finishBtn');
            btn.innerText = "Сохранение...";
            btn.disabled = true;

            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ type: 'result', name: name, startTime: startTimeFormatted, time: timeString, cheats: cheatCount }) 
            });

            alert("Тест завершен. Ваши данные сохранены!");
            location.reload();
        }
    </script>
</body>
</html>

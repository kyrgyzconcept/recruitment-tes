<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-тестирование</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 15px; }
        button:hover { background: #0056b3; }
        #test-frame { display: none; width: 100vw; height: 100vh; border: none; }
        video { display: none; }
    </style>
</head>
<body>

    <div class="container" id="reg-screen">
        <h2>Регистрация кандидата</h2>
        <p style="font-size: 14px; color: #666;">Пожалуйста, заполните данные перед началом теста. Убедитесь, что камера не закрыта.</p>
        <input type="text" id="cand-name" placeholder="Имя" required>
        <input type="text" id="cand-surname" placeholder="Фамилия" required>
        <input type="tel" id="cand-phone" placeholder="Номер телефона" required>
        <input type="email" id="cand-email" placeholder="Email" required>
        <input type="text" id="cand-position" placeholder="Должность" required>
        <button onclick="startTest()">Начать тестирование</button>
    </div>

    <iframe id="test-frame"></iframe>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // =================================================================
        // ВСТАВЬТЕ СЮДА ВАШИ ССЫЛКИ И ID
        // =================================================================
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLD7Bfba_vzMm6tlm27T_bhAi7R5mrAGe-HhBYCysvoN-oy5EULQTKqKF6qtluuscp7w/exec"; 
        
        // Вставьте базовую ссылку на форму ДО знака вопроса (заканчивается на /viewform)
        const FORM_BASE_URL = "https://forms.gle/u1hN3tHiMGE49MnJA";
        
        // Вставьте тот самый entry ID для поля Email (например: entry.123456789)
        const EMAIL_ENTRY_ID = "entry.512214351"; 
        // =================================================================


        let candidateData = {};
        let startTime, timerInterval, photoInterval;
        let cheatCount = 0;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');

        async function startTest() {
            candidateData = {
                name: document.getElementById('cand-name').value.trim(),
                surname: document.getElementById('cand-surname').value.trim(),
                phone: document.getElementById('cand-phone').value.trim(),
                email: document.getElementById('cand-email').value.trim(),
                position: document.getElementById('cand-position').value.trim()
            };

            if (!candidateData.name || !candidateData.surname || !candidateData.email) {
                alert("Пожалуйста, заполните Имя, Фамилию и Email.");
                return;
            }

            try {
                // Запрос к камере
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                // Переключение экранов
                document.getElementById('reg-screen').style.display = 'none';
                const iframe = document.getElementById('test-frame');
                iframe.style.display = 'block';
                document.body.style.margin = "0"; // Убираем отступы
                
                // Формируем предзаполненную ссылку на форму
                iframe.src = `${FORM_BASE_URL}?${EMAIL_ENTRY_ID}=${encodeURIComponent(candidateData.email)}`;

                // Фиксируем время начала
                let now = new Date();
                candidateData.startTime = now.toLocaleString("ru-RU");
                candidateData.startMs = now.getTime();

                // Отправляем первичные данные на сервер
                sendDataToServer({
                    type: "photo", // Отправляем пустую стартовую карточку
                    name: candidateData.name,
                    surname: candidateData.surname,
                    phone: candidateData.phone,
                    email: candidateData.email,
                    position: candidateData.position,
                    startTime: candidateData.startTime,
                    image: "" // Без фото для первого пинга
                });

                // Включаем таймер (каждую минуту обновляем финальный результат)
                timerInterval = setInterval(updateTimeAndSend, 60000); 

                // Включаем случайные фото (каждые 3-5 минут)
                scheduleNextPhoto();

                // Отслеживаем переключение вкладок (читинг)
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        cheatCount++;
                        alert("Внимание! Покидать вкладку тестирования запрещено. Нарушение зафиксировано.");
                        updateTimeAndSend(); // Сразу отправляем обновленный счетчик нарушений
                    }
                });

            } catch (err) {
                alert("Для прохождения теста необходимо разрешить доступ к камере.");
            }
        }

        function scheduleNextPhoto() {
            // Случайный интервал от 3 до 5 минут
            const randomTime = Math.floor(Math.random() * (300000 - 180000 + 1)) + 180000;
            photoInterval = setTimeout(() => {
                takeAndSendPhoto();
                scheduleNextPhoto(); // Запускаем цикл заново
            }, randomTime);
        }

        function takeAndSendPhoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg', 0.6); // Сжимаем до 60%

            sendDataToServer({
                type: "photo",
                name: candidateData.name,
                surname: candidateData.surname,
                email: candidateData.email,
                image: imageData
            });
        }

        function updateTimeAndSend() {
            let currentMs = new Date().getTime();
            let minutesPassed = Math.floor((currentMs - candidateData.startMs) / 60000);

            sendDataToServer({
                type: "result",
                email: candidateData.email,
                startTime: candidateData.startTime,
                time: minutesPassed,
                cheats: cheatCount
            });
        }

        function sendDataToServer(dataObj) {
            fetch(APP_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataObj)
            }).catch(e => console.error(e));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-тестирование</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; margin: auto; border-top: 5px solid #64b5f6; }
        h2 { color: #1e88e5; margin-bottom: 15px; }
        .warning-text { font-size: 14px; color: #d32f2f; font-weight: 500; margin-bottom: 20px; background: #ffebee; padding: 10px; border-radius: 5px; border: 1px solid #ffcdd2; }
        input[type="text"], input[type="tel"], input[type="email"] { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }

        .btn-start { background: #64b5f6; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn-start:hover { background: #42a5f5; }
        .btn-finish { background: #43a047; color: white; border: none; padding: 8px 25px; font-size: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-finish:hover { background: #2e7d32; }
        .btn-finish:disabled { background: #6c757d; cursor: not-allowed; box-shadow: none; }

        #workspace { display: none; flex-direction: column; width: 100vw; height: 100vh; }
        #test-frame { flex-grow: 1; width: 100%; border: none; }

        .bottom-bar { padding: 10px 15px; background: #2f3a40; display: flex; flex-direction: row; justify-content: center; align-items: center; width: 100%; color: #fff; box-sizing: border-box; gap: 20px; flex-wrap: wrap; }
        .checkbox-container { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; margin: 0; }
        .checkbox-container input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; margin: 0; }

        video { display: none; }
        #thanks-screen { display: none; text-align: center; margin: auto; }
    </style>
</head>
<body>

    <div class="container" id="reg-screen">
        <h2>Регистрация кандидата</h2>
        <div class="warning-text">Пожалуйста, заполните все данные ниже, иначе ваши результаты не будут учтены. Убедитесь, что камера работает.</div>
        
        <input type="text" id="cand-name" placeholder="Имя" required>
        <input type="text" id="cand-surname" placeholder="Фамилия" required>
        <input type="tel" id="cand-phone" placeholder="Номер телефона" required>
        <input type="email" id="cand-email" placeholder="Ваш Email" required>
        <input type="text" id="cand-position" placeholder="Должность" required>
        
        <button class="btn-start" id="btn-start" onclick="startTest()">Начать тестирование</button>
    </div>

    <div id="workspace">
        <iframe id="test-frame"></iframe>
        <div class="bottom-bar">
            <label class="checkbox-container">
                <input type="checkbox" id="confirm-submit" onchange="toggleFinishButton()">
                Я нажал(а) кнопку «Отправить» в Google Форме
            </label>
            <button class="btn-finish" id="finish-btn" onclick="finishTestManual()" disabled>Завершить тестирование</button>
        </div>
    </div>

    <div class="container" id="thanks-screen">
        <h2>Тестирование успешно завершено!</h2>
        <p>Спасибо, ваши ответы и результаты сохранены. Вы можете закрыть эту вкладку.</p>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZNkg6JFUnqSpREklgX2jkIINCze4TaHe6JL5aUEsw-34yoAGl7H33z_kvFu7qR3e-dg/exec"; 
        const FORM_BASE_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeY7m87iwRWwJofpYjT4QGf05SlRmX5vvh82qctT0WgJFnp4w/viewform";
        const EMAIL_ENTRY_ID = "512214351";

        let candidateData = {};
        let startTime, timerInterval, photoInterval;
        let streamInstance = null;
        let isFinished = false; 
        let cheatCount = parseInt(sessionStorage.getItem('testCheats')) || 0;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');

        window.onload = function() {
            if (sessionStorage.getItem('testFinished') === 'true') {
                document.getElementById('reg-screen').style.display = 'none';
                document.getElementById('thanks-screen').style.display = 'block';
                return;
            }

            let savedData = sessionStorage.getItem('testData');
            if (savedData) {
                candidateData = JSON.parse(savedData);
                document.getElementById('cand-name').value = candidateData.name || '';
                document.getElementById('cand-surname').value = candidateData.surname || '';
                document.getElementById('cand-phone').value = candidateData.phone || '';
                document.getElementById('cand-email').value = candidateData.email || '';
                document.getElementById('cand-position').value = candidateData.position || '';
            }
        };

        function toggleFinishButton() {
            document.getElementById('finish-btn').disabled = !document.getElementById('confirm-submit').checked;
        }

        // --- NEW DATA SENDER (FIX FOR RACE CONDITIONS) ---
        // Automatically injects core candidate data into EVERY request
        function sendDataToServer(dataObj, isClosing = false) {
            if (candidateData.email) {
                dataObj.name = dataObj.name || candidateData.name;
                dataObj.surname = dataObj.surname || candidateData.surname;
                dataObj.phone = dataObj.phone || candidateData.phone;
                dataObj.email = dataObj.email || candidateData.email;
                dataObj.position = dataObj.position || candidateData.position;
                dataObj.startTime = dataObj.startTime || candidateData.startTime;
            }

            if (candidateData.startMs) {
                let currentMs = new Date().getTime();
                dataObj.time = Math.floor((currentMs - candidateData.startMs) / 60000);
            }

            const formData = new URLSearchParams();
            formData.append("data", JSON.stringify(dataObj));

            fetch(APP_SCRIPT_URL, {
                method: 'POST',
                body: formData,
                keepalive: isClosing 
            }).catch(e => console.error("Ошибка отправки:", e));
        }

        async function startTest() {
            candidateData.name = document.getElementById('cand-name').value.trim();
            candidateData.surname = document.getElementById('cand-surname').value.trim();
            candidateData.phone = document.getElementById('cand-phone').value.trim();
            candidateData.email = document.getElementById('cand-email').value.trim();
            candidateData.position = document.getElementById('cand-position').value.trim();

            if (!candidateData.name || !candidateData.surname || !candidateData.phone || !candidateData.email || !candidateData.position) {
                return alert("Пожалуйста, заполните все поля. Ни одна строка не должна быть пустой.");
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(candidateData.email)) {
                return alert("Пожалуйста, введите корректный адрес электронной почты, содержащий символ '@'.");
            }

            let digitsOnly = candidateData.phone.replace(/\D/g, '');
            if (digitsOnly.length < 9) {
                return alert("Номер телефона должен содержать минимум 9 цифр.");
            }

            const btnStart = document.getElementById('btn-start');
            btnStart.innerText = "Подключение...";
            btnStart.disabled = true;

            try {
                streamInstance = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = streamInstance;

                document.getElementById('reg-screen').style.display = 'none';
                document.getElementById('workspace').style.display = 'flex';

                const iframe = document.getElementById('test-frame');
                iframe.src = FORM_BASE_URL + "?entry." + EMAIL_ENTRY_ID + "=" + encodeURIComponent(candidateData.email);

                if (!candidateData.startMs) {
                    let now = new Date();
                    candidateData.startTime = now.toLocaleString("ru-RU");
                    candidateData.startMs = now.getTime();
                }
                
                sessionStorage.setItem('testData', JSON.stringify(candidateData));

                sendDataToServer({
                    type: "result",
                    cheats: cheatCount
                });

                timerInterval = setInterval(updateTimeAndSend, 60000);
                
                setTimeout(() => {
                    if (!isFinished) {
                        takeAndSendPhoto();
                        scheduleNextPhoto();
                    }
                }, 5000);

                document.addEventListener('visibilitychange', handleVisibilityChange);

            } catch (err) {
                alert("Для прохождения теста необходим доступ к камере.");
                btnStart.innerText = "Начать тестирование";
                btnStart.disabled = false;
            }
        }

        function handleVisibilityChange() {
            if (document.hidden && !isFinished) {
                cheatCount++;
                sessionStorage.setItem('testCheats', cheatCount);
                updateTimeAndSend();
                alert("Внимание! Покидать вкладку тестирования запрещено. Нарушение зафиксировано.");
            }
        }

        // --- TRIPLE REDUNDANCY TAB CLOSE DETECTION ---
        window.addEventListener('pagehide', function(e) {
            if (!isFinished) sendDataToServer({ type: "close" }, true);
        });
        window.addEventListener('beforeunload', function(e) {
            if (!isFinished) sendDataToServer({ type: "close" }, true);
        });
        window.addEventListener('unload', function(e) {
            if (!isFinished) sendDataToServer({ type: "close" }, true);
        });

        function scheduleNextPhoto() {
            if (isFinished) return;
            const randomTime = Math.floor(Math.random() * (90000 - 45000 + 1)) + 45000;
            photoInterval = setTimeout(() => {
                takeAndSendPhoto();
                scheduleNextPhoto();
            }, randomTime);
        }

        function takeAndSendPhoto() {
            if (!streamInstance || isFinished) return;
            if (video.videoWidth === 0 || video.videoHeight === 0) return; 
            
            const MAX_WIDTH = 640;
            const scale = Math.min(MAX_WIDTH / video.videoWidth, 1);
            canvas.width = video.videoWidth * scale;
            canvas.height = video.videoHeight * scale;
            
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg', 0.4);

            sendDataToServer({
                type: "photo",
                image: imageData
            });
        }

        function updateTimeAndSend() {
            if (isFinished) return;
            sendDataToServer({
                type: "result",
                cheats: cheatCount
            });
        }

        function finishTestManual() {
            if(!confirm("Вы уверены, что хотите завершить тест? Камера будет отключена.")) return;

            isFinished = true; 
            sessionStorage.setItem('testFinished', 'true');
            
            clearInterval(timerInterval);
            clearTimeout(photoInterval);

            document.removeEventListener('visibilitychange', handleVisibilityChange);

            if (streamInstance) {
                streamInstance.getTracks().forEach(track => track.stop());
            }

            sendDataToServer({
                type: "final_click",
                cheats: cheatCount
            });

            document.getElementById('workspace').style.display = 'none';
            document.getElementById('thanks-screen').style.display = 'block';
        }
    </script>
</body>
</html>
